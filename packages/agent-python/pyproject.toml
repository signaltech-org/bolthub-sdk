[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bolthub"
version = "0.7.0"
description = "The bolthub payments SDK for Python: charge for an MCP tool or HTTP endpoint, and pay for them, over Lightning (L402)"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = ["httpx>=0.24"]
keywords = ["l402", "lightning", "bitcoin", "micropayments", "ai-agent", "paywall", "mcp", "payments"]

[project.optional-dependencies]
# Nostr Wallet Connect (NIP-47) support for NwcWallet.from_uri / AsyncNwcWallet.
# websockets handles the relay transport; cryptography provides AES-256-CBC and
# SECP256K1 ECDH for NIP-04. BIP-340 event signing is vendored (pure Python), so
# no native secp256k1 build is required.
nwc = ["websockets>=13", "cryptography>=41"]
# Offline macaroon attenuation for delegating a restricted credential to a
# sub-agent (bolthub.attenuate). pymacaroons handles the libmacaroons v2 binary.
delegation = ["pymacaroons>=0.13"]
dev = ["pytest", "websockets>=13", "cryptography>=41", "pymacaroons>=0.13"]

[project.urls]
Homepage = "https://bolthub.ai"
Repository = "https://github.com/signaltech-org/bolthub-sdk"
Issues = "https://github.com/signaltech-org/bolthub-sdk/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
