# Publishes the bolthub SDK packages from this public repo so that npm
# provenance can attest the exact public source + workflow each tarball
# was built from. (Provenance requires the build to run in the repo that
# package.json `repository` points at — that's this one.)
name: Publish Packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      packages:
        description: "Packages to publish (comma-separated: agent,mcp-bridge,mcp-registry,verify,cli,python,verify-python)"
        required: false
        default: "agent,mcp-bridge,mcp-registry,verify,cli,python,verify-python"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm --provenance (Sigstore OIDC signing).
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: agent
            pkg: "@bolthub/agent"
            dir: packages/agent
          - key: verify
            pkg: "@bolthub/verify"
            dir: packages/verify
          - key: mcp-registry
            pkg: "@bolthub/mcp-registry"
            dir: packages/mcp-registry
          - key: mcp-bridge
            pkg: "@bolthub/mcp-bridge"
            dir: packages/mcp-bridge
          - key: cli
            pkg: "@bolthub/cli"
            dir: packages/cli
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: 1.3.5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      # Steps below key off `changed`; when this step is skipped (package
      # not selected via workflow_dispatch input) the output is empty and
      # everything downstream is skipped too.
      - name: Check if version changed
        if: github.event_name == 'push' || contains(github.event.inputs.packages, matrix.key)
        id: check-version
        run: |
          PUBLISHED=$(npm view ${{ matrix.pkg }} version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./${{ matrix.dir }}/package.json').version")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "changed=$( [ "$PUBLISHED" != "$LOCAL" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      # @bolthub/agent is a workspace dep consumed via its built dist —
      # it must exist before testing/building the packages that bundle it.
      - name: Build workspace dep @bolthub/agent
        if: steps.check-version.outputs.changed == 'true' && matrix.key != 'agent'
        working-directory: packages/agent
        run: bun run build

      - name: Test
        if: steps.check-version.outputs.changed == 'true'
        working-directory: ${{ matrix.dir }}
        run: bun test

      - name: Build
        if: steps.check-version.outputs.changed == 'true'
        working-directory: ${{ matrix.dir }}
        run: bun run build

      # Bun bundles every workspace dep into dist/index.js, so the
      # published tarball needs none of them declared. Leaving a literal
      # `workspace:*` in the manifest breaks `npm install` with
      # EUNSUPPORTEDPROTOCOL — strip them right before publish.
      - name: Strip workspace deps from published manifest
        if: steps.check-version.outputs.changed == 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const field of ['dependencies', 'peerDependencies', 'devDependencies']) {
              if (!pkg[field]) continue;
              for (const [k, v] of Object.entries(pkg[field])) {
                if (typeof v === 'string' && v.startsWith('workspace:')) {
                  console.log('strip ' + field + '.' + k + ' (' + v + ')');
                  delete pkg[field][k];
                }
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Publish ${{ matrix.pkg }}
        if: steps.check-version.outputs.changed == 'true'
        working-directory: ${{ matrix.dir }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip (version unchanged)
        if: steps.check-version.outputs.changed == 'false'
        run: echo "Skipping ${{ matrix.pkg }} — local (${{ steps.check-version.outputs.local }}) matches published (${{ steps.check-version.outputs.published }})"

  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for PyPI Trusted Publishing (no API token; PEP 740
      # attestations are generated automatically).
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: python
            pkg: bolthub
            dir: packages/agent-python
          - key: verify-python
            pkg: bolthub-verify
            dir: packages/verify-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if version changed
        if: github.event_name == 'push' || contains(github.event.inputs.packages, matrix.key)
        id: check-version
        run: |
          pip install requests 2>/dev/null
          PUBLISHED=$(python -c "import requests; r = requests.get('https://pypi.org/pypi/${{ matrix.pkg }}/json'); print(r.json()['info']['version'] if r.ok else '0.0.0')" 2>/dev/null || echo "0.0.0")
          LOCAL=$(python -c "import tomllib; print(tomllib.load(open('${{ matrix.dir }}/pyproject.toml','rb'))['project']['version'])")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "changed=$( [ "$PUBLISHED" != "$LOCAL" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Build ${{ matrix.pkg }}
        if: steps.check-version.outputs.changed == 'true'
        working-directory: ${{ matrix.dir }}
        run: pip install build && python -m build

      - name: Publish ${{ matrix.pkg }} to PyPI
        if: steps.check-version.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.dir }}/dist

      - name: Skip (version unchanged)
        if: steps.check-version.outputs.changed == 'false'
        run: echo "Skipping ${{ matrix.pkg }} — local (${{ steps.check-version.outputs.local }}) matches published (${{ steps.check-version.outputs.published }})"
